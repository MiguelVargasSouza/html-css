<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Parágrafos e Quebras</h1>
    <hr>
    <p> eu posso escrever um parágrafo de qualquer jeito. Basta colocar tudo no meio do par de tags &lt;p&gt; e &lt;/p&gt; <!--lt é LESS THAN (menor que), e gt é GREATER THAN (maior que) -->
    </p>
    <p>Se precisar quebrar o texto em algum luar específico como esse, <br> você pode usar a tag &lt;br&gt;.</p>
    <p>adicionando alguns símbolos especiais: <br>
        &reg;
        &copy;
        &trade;
        &real;
        &euro;
        &pound;
        &yen;
        &Delta;
        &darr;
        &uarr;
    </p>
    <p>Agora os emojis: <br>
        &#x1F5E1;
        &#x1F93A;
        

    </p>
</body>
</html>
