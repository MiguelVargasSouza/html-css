<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vídeos com HTML5</title>
</head>
<body>
    <h1>Inserindo vídeos hospedados localmente</h1>
    <p>Este vídeo está hospedado no meu próprio servidor.</p>
    <video src="midia/meu-video.mp4.mp4" muted autoplay></video>
<!--Caso você tenha uma capa pro vídeo, você poderá usar dentro da tag video o "poster" assim podendo colocar a localização dos seus arquivos para achar ele, colocando ele no site. se você usar a tag muted, o auto play funciona, não sei o porquê.-->

    <h1>Inserindo vídeo do YouTube</h1>

    <iframe width="560" height="315" src="https://www.youtube.com/embed/_ZOBnR9ph6w?si=rixovoL6uXUxCfbl" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
