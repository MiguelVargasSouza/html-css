<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <style>
        h1 {
    background-color: aquamarine;
    height: 300px; width: 300px;

    border: 10px solid darkslategray;

    padding: 10px 10px 10px 10px;
    
    margin: 10px 10px 10px 10px;

    outline:5px dashed salmon
    }
    
    a {border-width: 10px; border-style: solid; border-color: red; padding: 10px;}
    </style>
</head> <!--margin:auto para deixar centralizado na tela automaticamente.
        up,right,bottom,left sentido horário. width, style, color. Se você colocar só uma configuração, vai ser a mesma em todas, se eu colocar tipo padding 10px, em todos os lados será 10px. Se colocar duas medidas como padding 10px 20px, será top 10px, right 20px, bottom 10px, left 20px.-->
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágrafos também sãp exemplos de box-level,mas os <a href="#"> links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona.</p>
</body>
</html>
